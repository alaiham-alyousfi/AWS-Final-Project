  apply-database:
    name: Apply - RDS MySQL Database
    runs-on: ubuntu-latest
    needs: apply-loadbalancer

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Apply DB Subnet Group - enterprise-private-1 and enterprise-private-4
        run: |
          terraform apply \
            -target=aws_db_subnet_group.main \
            -auto-approve -no-color
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Apply RDS - enterprise-mysql - MySQL 8.0 - db.t3.micro - appdb - publicly_accessible false - enterprise-rds-sg
        run: |
          terraform apply \
            -target=aws_db_instance.main \
            -auto-approve -no-color
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Wait for RDS enterprise-mysql to become available
        run: |
          echo "Waiting for RDS enterprise-mysql to be available..."
          aws rds wait db-instance-available \
            --db-instance-identifier enterprise-mysql
          echo "RDS enterprise-mysql is now available"

      - name: Verify RDS - enterprise-mysql - publicly_accessible must be false
        run: |
          aws rds describe-db-instances \
            --db-instance-identifier enterprise-mysql \
            --query "DBInstances[*].{Id:DBInstanceIdentifier,Status:DBInstanceStatus,Engine:Engine,Version:EngineVersion,Class:DBInstanceClass,PublicAccess:PubliclyAccessible,Endpoint:Endpoint.Address,Port:Endpoint.Port,MultiAZ:MultiAZ}" \
            --output table

  apply-monitoring:
    name: Apply - CloudWatch Monitoring and Alerts
    runs-on: ubuntu-latest
    needs: apply-database

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Apply SNS Topic - aerts1 - arn:aws:sns:us-east-1:644786176177:aerts1 - display name aa23
        run: |
          terraform apply \
            -target=aws_sns_topic.alerts \
            -target=aws_sns_topic_subscription.email \
            -auto-approve -no-color
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Apply CloudWatch Log Groups - /enterprise-aws/nginx/access and /enterprise-aws/nginx/error
        run: |
          terraform apply \
            -target=aws_cloudwatch_log_group.nginx_access \
            -target=aws_cloudwatch_log_group.nginx_error \
            -auto-approve -no-color
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Apply CloudWatch Alarm - enterprise-web-server-1 - i-0de9c704f852e3e87 - CPUUtilization over 80
        run: |
          terraform apply \
            -target=aws_cloudwatch_metric_alarm.cpu_web1 \
            -auto-approve -no-color
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Apply CloudWatch Alarm - enterprise-private-2 - i-07eb949a647bdd473 - CPUUtilization over 80
        run: |
          terraform apply \
            -target=aws_cloudwatch_metric_alarm.cpu_web2 \
            -auto-approve -no-color
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Apply CloudWatch Alarm - enterprise-alb - UnHealthyHostCount over 0
        run: |
          terraform apply \
            -target=aws_cloudwatch_metric_alarm.unhealthy_hosts \
            -auto-approve -no-color
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Apply CloudWatch Dashboard - aaai21 - CPUUtilization and StatusCheckFailed
        run: |
          terraform apply \
            -target=aws_cloudwatch_dashboard.main \
            -auto-approve -no-color
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Verify SNS - arn:aws:sns:us-east-1:644786176177:aerts1
        run: |
          aws sns get-topic-attributes \
            --topic-arn arn:aws:sns:us-east-1:644786176177:aerts1 \
            --query "Attributes.{TopicArn:TopicArn,SubscriptionsConfirmed:SubscriptionsConfirmed}" \
            --output table

      - name: Verify CloudWatch Alarms - CPUUtilization i-0de9c704f852e3e87 and i-07eb949a647bdd473
        run: |
          aws cloudwatch describe-alarms \
            --alarm-names \
              "enterprise-web-server-1-cpu-high" \
              "enterprise-web-server-2-cpu-high" \
              "enterprise-alb-unhealthy-hosts" \
            --query "MetricAlarms[*].{Name:AlarmName,State:StateValue,Metric:MetricName,Threshold:Threshold,Period:Period}" \
            --output table

      - name: Verify CloudWatch Dashboard - aaai21
        run: |
          aws cloudwatch list-dashboards \
            --query "DashboardEntries[?DashboardName=='aaai21'].{Name:DashboardName,Modified:LastModified,Size:Size}" \
            --output table

